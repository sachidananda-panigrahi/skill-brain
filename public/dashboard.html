<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillBrain — AI Skills Server</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
          },
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] }
        }
      }
    };
  </script>
  <style>
    .skill-card:hover {
      transform: translateY(-1px);
    }

    .fade-in {
      animation: fadeIn .25s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .pulse-dot {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    .template-box {
      max-height: 7rem;
      overflow-y: auto;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 2px;
    }

    .sev-CRITICAL {
      border-left-color: #dc2626;
      background: #fef2f2;
    }

    .sev-HIGH {
      border-left-color: #ea580c;
      background: #fff7ed;
    }

    .sev-MEDIUM {
      border-left-color: #d97706;
      background: #fffbeb;
    }

    .sev-LOW {
      border-left-color: #3b82f6;
      background: #eff6ff;
    }

    /* Documentation Styles */
    #docViewer {
      scroll-behavior: smooth;
    }

    .prose :where(pre):not(:where([class~="not-prose"] *)) {
      background-color: #1e293b;
      color: #e2e8f0;
      border-radius: 0.75rem;
      border: 1px solid #334155;
    }

    .prose :where(code):not(:where([class~="not-prose"] *)) {
      background-color: #f1f5f9;
      color: #475569;
      padding: 0.125rem 0.25rem;
      border-radius: 0.375rem;
      font-weight: 500;
      font-size: 0.875em;
    }

    .prose :where(pre code):not(:where([class~="not-prose"] *)) {
      background-color: transparent;
      color: inherit;
      padding: 0;
    }

    .prose h1 {
      font-size: 2.25rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 1rem;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 0.5rem;
    }

    .prose h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e293b;
      margin-top: 2rem;
      margin-bottom: 1rem;
    }

    .prose h3 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #334155;
      margin-top: 1.5rem;
    }

    .prose p {
      margin-top: 1rem;
      margin-bottom: 1rem;
      line-height: 1.75;
      color: #475569;
    }

    .prose ul,
    .prose ol {
      margin-top: 1rem;
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }

    .prose li {
      margin-top: 0.25rem;
      margin-bottom: 0.25rem;
    }

    .prose blockquote {
      border-left: 4px solid #e2e8f0;
      padding-left: 1rem;
      font-style: italic;
      color: #64748b;
      margin: 1.5rem 0;
    }

    .prose table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.875rem;
    }

    .prose th {
      background-color: #f8fafc;
      text-align: left;
      padding: 0.75rem;
      border-bottom: 2px solid #e2e8f0;
      color: #475569;
      font-weight: 600;
    }

    .prose td {
      padding: 0.75rem;
      border-bottom: 1px solid #f1f5f9;
      color: #64748b;
    }

    .prose tr:hover td {
      background-color: #f8fafc;
    }

    .code-block-wrapper {
      position: relative;
      group: hover;
    }

    .doc-copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      opacity: 0;
      transition: all 0.2s;
      background: #334155;
      color: #f1f5f9;
      border: 1px solid #475569;
      border-radius: 0.375rem;
      padding: 0.25rem 0.5rem;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      z-index: 10;
    }

    .code-block-wrapper:hover .doc-copy-btn {
      opacity: 1;
    }

    .doc-copy-btn:hover {
      background: #475569;
      border-color: #64748b;
    }

    .doc-copy-btn.copied {
      background: #059669;
      border-color: #059669;
      color: white;
      opacity: 1;
    }
  </style>
</head>

<body class="bg-zinc-50 font-sans text-slate-800 min-h-screen">

  <div class="flex h-screen overflow-hidden">

    <!-- ── Sidebar ──────────────────────────────────────────────────── -->
    <aside class="w-64 bg-slate-900 flex-shrink-0 flex flex-col h-full overflow-y-auto">
      <div class="px-6 py-5 flex items-center gap-3 border-b border-slate-700">
        <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z" />
          </svg>
        </div>
        <span class="text-white font-bold text-lg">SkillBrain</span>
      </div>

      <div id="healthPill"
        class="mx-4 mt-4 px-3 py-2 rounded-xl bg-slate-800 flex items-center gap-2 text-xs text-slate-400">
        <span id="healthDot" class="w-2 h-2 rounded-full bg-slate-500 pulse-dot"></span>
        <span id="healthText">Connecting…</span>
      </div>

      <div class="px-4 mt-4">
        <label class="text-xs text-slate-500 font-medium uppercase tracking-widest block mb-1">Project</label>
        <select id="projectSelect" onchange="switchProject()"
          class="w-full bg-slate-800 text-slate-200 text-sm rounded-lg border border-slate-700 px-3 py-2 focus:outline-none focus:ring-1 focus:ring-brand-500">
          <option value="">— Global —</option>
        </select>
      </div>

      <nav class="mt-6 flex-1 px-2 space-y-1">
        <button onclick="navigateToSection('overview')" data-nav="overview"
          class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
          </svg>
          Skills Overview
        </button>
        <button onclick="navigateToSection('search')" data-nav="search"
          class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          Semantic Search
        </button>
        <button onclick="navigateToSection('scan')" data-nav="scan"
          class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z" />
          </svg>
          Scan Project
        </button>
        <button onclick="navigateToSection('review')" data-nav="review"
          class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
          </svg>
          Code Review
        </button>
        <button onclick="navigateToSection('add')" data-nav="add"
          class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          New Skill
        </button>
        <button onclick="navigateToSection('docs')" data-nav="docs"
          class="nav-btn w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-300 hover:bg-slate-800 hover:text-white transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18 18.246 18.477 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
          Documentation
        </button>
      </nav>

      <div class="px-4 pb-5 mt-4">
        <button onclick="navigateToSection('add')"
          class="w-full bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold py-2.5 rounded-xl transition-colors">
          + Add Skill
        </button>
      </div>
    </aside>

    <!-- ── Main ─────────────────────────────────────────────────────── -->
    <main class="flex-1 overflow-y-auto">
      <div id="sectionMount" class="min-h-full">
        <div class="p-8 text-sm text-slate-400">Loading section…</div>
      </div>

    </main>
  </div>

  <!-- Delete modal -->
  <div id="deleteModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full mx-4">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 bg-rose-100 rounded-full flex items-center justify-center flex-shrink-0">
          <svg class="w-5 h-5 text-rose-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
        <div>
          <p class="font-semibold text-slate-900">Delete skill?</p>
          <p class="text-sm text-slate-500" id="deleteSkillName"></p>
        </div>
      </div>
      <div class="flex gap-3">
        <button onclick="confirmDelete()"
          class="flex-1 bg-rose-600 hover:bg-rose-700 text-white text-sm font-semibold py-2.5 rounded-lg transition-colors">Delete</button>
        <button onclick="closeDeleteModal()"
          class="flex-1 border border-slate-200 hover:bg-slate-50 text-slate-700 text-sm font-medium py-2.5 rounded-lg transition-colors">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/dashboard.js"></script>
</body>

</html>
