name: SkillBrain Code Review

on:
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write

jobs:
  skill-review:
    name: Run SkillBrain Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run SkillBrain review
        id: review
        run: |
          node scanProject.js \
            --review=origin/${{ github.base_ref }} \
            --format=both \
            --output=.review/report
        continue-on-error: true

      - name: Post review summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mdPath = '.review/report.md';
            if (!fs.existsSync(mdPath)) {
              console.log('No report found — skipping PR comment');
              return;
            }
            const body = fs.readFileSync(mdPath, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body.substring(0, 65000)
            });

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-review-report
          path: .review/
          if-no-files-found: ignore

      - name: Check exit code
        run: |
          if [ -f .review/report.json ]; then
            EXIT_CODE=$(node -e "const r=require('./.review/report.json'); process.exit(r.meta.ciExitCode)")
            echo "CI exit code: $EXIT_CODE"
            exit $EXIT_CODE
          fi
